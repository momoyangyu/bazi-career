<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你的职场本命测评</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#333}
        .container{max-width:480px;margin:0 auto;padding:20px}
        .card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
        .header{text-align:center;padding:30px 0}
        .header h1{color:white;font-size:26px;margin-bottom:8px}
        .header p{color:rgba(255,255,255,0.9);font-size:14px}
        .step-indicator{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
        .step-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3)}
        .step-dot.active{background:white;width:24px;border-radius:5px}
        .section-title{font-size:17px;font-weight:600;margin-bottom:18px;color:#333;line-height:1.5}
        .form-group{margin-bottom:18px}
        .form-label{display:block;font-size:14px;color:#666;margin-bottom:8px}
        .form-input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px}
        .form-input:focus{border-color:#764ba2;outline:none}
        .form-row{display:flex;gap:12px}
        .form-row .form-group{flex:1}
        .radio-group{display:flex;flex-direction:column;gap:10px}
        .radio-option{display:flex;align-items:flex-start;padding:14px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:all .3s}
        .radio-option:hover{border-color:#764ba2}
        .radio-option.selected{border-color:#764ba2;background:#f8f4ff}
        .radio-option input{display:none}
        .radio-circle{width:20px;height:20px;border:2px solid #ccc;border-radius:50%;margin-right:12px;flex-shrink:0;margin-top:2px;position:relative}
        .radio-option.selected .radio-circle{border-color:#764ba2}
        .radio-option.selected .radio-circle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#764ba2;border-radius:50%}
        .radio-text{font-size:14px;color:#333;line-height:1.5}
        .btn{width:100%;padding:16px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;transition:transform .2s}
        .btn:hover{transform:translateY(-2px)}
        .tip{font-size:12px;color:#999;margin-top:8px}
        .progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:16px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .3s}
        .theme-badge{display:inline-block;background:#e8f4ff;color:#2196f3;padding:4px 12px;border-radius:12px;font-size:12px;margin-bottom:14px}
        .loading{text-align:center;padding:60px 40px}
        .loading-spinner{width:50px;height:50px;border:4px solid #f0e6ff;border-top-color:#764ba2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-size:16px;color:#333;margin-bottom:8px}
        .loading-sub{font-size:13px;color:#999}
        .hidden{display:none}
        .result-hero{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:24px;text-align:center}
        .result-type-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:6px 16px;border-radius:20px;font-size:13px;margin-bottom:10px}
        .result-type-name{font-size:28px;font-weight:bold;margin-bottom:6px}
        .result-type-tagline{font-size:14px;opacity:0.9;line-height:1.5}
        .result-body{padding:20px}
        .result-section{margin-bottom:22px}
        .result-title{font-size:15px;font-weight:600;color:#764ba2;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .result-title::before{content:'';width:4px;height:16px;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:2px}
        .result-content{font-size:14px;line-height:1.8;color:#555}
        .result-content p{margin-bottom:10px}
        .highlight{color:#764ba2;font-weight:600}
        .strength-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
        .strength-item{background:linear-gradient(135deg,#f8f4ff,#fff);padding:14px 10px;border-radius:10px;text-align:center}
        .strength-icon{font-size:22px;margin-bottom:6px}
        .strength-name{font-size:13px;font-weight:600;color:#333;margin-bottom:3px}
        .strength-desc{font-size:11px;color:#888}
        .career-card{background:#f8f4ff;padding:14px;border-radius:10px;margin-bottom:10px;border-left:4px solid #764ba2}
        .career-card:last-child{margin-bottom:0}
        .career-rank{display:inline-block;background:#764ba2;color:white;width:22px;height:22px;border-radius:50%;text-align:center;line-height:22px;font-size:11px;margin-right:8px}
        .career-title{font-weight:600;color:#333;margin-bottom:3px;font-size:14px}
        .career-reason{font-size:12px;color:#666;line-height:1.4}
        .quote-box{background:#f5f5f5;padding:14px;border-radius:10px;font-style:italic;color:#764ba2;text-align:center;line-height:1.6;margin:12px 0}
        .growth-box{background:#e8f5e9;padding:14px;border-radius:10px;margin-top:12px}
        .growth-title{font-weight:600;color:#2e7d32;margin-bottom:8px;font-size:14px}
        .growth-item{display:flex;align-items:flex-start;margin-bottom:6px;font-size:13px;color:#555}
        .growth-icon{margin-right:8px}
        .tip-box{background:#e3f2fd;padding:14px;border-radius:10px;margin-top:12px}
        .tip-title{font-weight:600;color:#1565c0;margin-bottom:6px;font-size:14px}
        .tip-text{font-size:13px;color:#555;line-height:1.5}
        .summary-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
        .summary-tag{background:#f0e6ff;color:#764ba2;padding:5px 12px;border-radius:16px;font-size:12px}
        .cta-box{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:24px;border-radius:16px;text-align:center;margin-top:16px}
        .cta-box h3{font-size:17px;margin-bottom:10px}
        .cta-box p{font-size:14px;opacity:0.9;margin-bottom:14px;line-height:1.5}
        .wechat-id{font-size:22px;font-weight:700;letter-spacing:2px;margin:12px 0 6px;color:white}
        .wechat-tip{font-size:12px;opacity:0.8;color:white;margin-bottom:4px}
        .copy-btn{background:rgba(255,255,255,0.2);color:white;padding:10px 24px;border-radius:20px;border:1px solid rgba(255,255,255,0.4);font-size:14px;cursor:pointer;margin-top:10px}
        .copy-btn:active{background:rgba(255,255,255,0.35)}
        .wechat-divider{width:60px;height:2px;background:rgba(255,255,255,0.3);margin:16px auto;border-radius:1px}
    </style>
</head>
<body>
    <div class="container">
        <div id="step1" class="page">
            <div class="header"><h1>你的职场本命测评</h1><p>用MBTI+心理学视角，找到最适合你的职业方向</p></div>
            <div class="card">
                <div class="step-indicator"><div class="step-dot active"></div><div class="step-dot"></div></div>
                <div class="section-title">请输入你的出生信息</div>
                <div class="form-group"><label class="form-label">出生年份</label><select class="form-input" id="birthYear"></select></div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">出生月份</label><select class="form-input" id="birthMonth"><option value="">请选择</option></select></div>
                    <div class="form-group"><label class="form-label">出生日</label><select class="form-input" id="birthDay"><option value="">请选择</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">出生时辰</label><select class="form-input" id="birthHour"><option value="">不确定</option></select></div>
                    <div class="form-group"><label class="form-label">性别</label><select class="form-input" id="gender"><option value="0">男</option><option value="1">女</option></select></div>
                </div>
                <div class="form-group"><label class="form-label">历法类型</label><select class="form-input" id="calendarType"><option value="1">公历（阳历）</option><option value="0">农历（阴历）</option></select></div>
                <p class="tip">💡 时辰越准确，测评结果越精准</p>
                <button class="btn" onclick="goToStep2()">开始测评</button>
            </div>
        </div>
        <div id="step2" class="page hidden">
            <div class="header"><h1>你的职场本命测评</h1><p id="progressText">第1题/共24题</p></div>
            <div class="card">
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:4%"></div></div>
                <div class="theme-badge" id="themeBadge">性格类型</div>
                <div id="questionContainer"></div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
            </div>
        </div>
        <div id="loading" class="page hidden">
            <div class="card"><div class="loading"><div class="loading-spinner"></div><p class="loading-text">正在分析你的职场本命...</p><p class="loading-sub">预计需要 15-30 秒</p></div></div>
        </div>
        <div id="result" class="page hidden">
            <div class="header"><h1>你的职场本命报告</h1></div>
            <div class="card" style="padding:0;overflow:hidden"><div id="resultContent"></div></div>
            <div class="cta-box"><h3>🌟 识人识己，方能乘势而为</h3><p style="text-align:left;line-height:2"><b>✦ 八字大运流年分析</b><br><b>✦ 奇门遁甲决策咨询</b><br><b>✦ 事业财运深度解读</b></p><div class="wechat-divider"></div><p style="font-size:13px;line-height:1.8;opacity:0.95">加微信，进入<b>「知命·职场星球」</b><br>📚 系统学习命理识人课程<br>🔮 一对一咨询服务</p><div class="wechat-tip" style="margin-top:12px">添加微信 · 备注「职场」</div><div class="wechat-id">Yuxiaoxian_GX</div><button class="copy-btn" onclick="copyWechat()">复制微信号</button></div>
        </div>
    </div>
    <script>

const mbtiData={'INTJ':{name:'战略家',tagline:'富有想象力和战略性的思想家，一切皆在计划中',emoji:'🎯',strengths:['战略思维','独立自主','高标准','理性分析'],summary:'你是一个天生的战略家，拥有深邃的洞察力和长远的规划能力。你善于发现模式和组织复杂信息，制定出宏伟的计划和系统化的解决方案。',quote:'你相信任何问题都有最优解，而你的使命就是找到它。',growth:'学会欣赏过程中的美好，不过度追求完美。尝试接受不完美的计划，有时候"完成比完美更重要"。'},'INTP':{name:'思想家',tagline:'极具创造力的发明家，沉浸在逻辑的世界里',emoji:'💡',strengths:['创新能力','分析能力','求知欲','客观理性'],summary:'你是一个追求真理的理想主义者，热爱智识探索，善于分析和理解复杂系统。你的思维具有极高的灵活性和原创性。',quote:'你沉迷于思考的过程本身，而不仅仅是答案。',growth:'思想需要落地才有价值。尝试将你的想法转化为实际行动，你会发现实践中的反馈会让你的思考更加深刻。'},'ENTJ':{name:'指挥官',tagline:'大胆、富有想象力的领导者，天生的决策者',emoji:'⚡',strengths:['领导力','决策力','执行力','战略眼光'],summary:'你是一个天生的领导者，拥有非凡的意志力和洞察力。你善于分析全局，制定战略，并推动团队朝着目标前进。',quote:'你相信只有想不到，没有做不到。',growth:'倾听是领导力的更高境界。学会在表达之前先真正理解他人的想法，你会发现团队的潜力远超你的想象。'},'ENTP':{name:'辩论家',tagline:'聪明好奇的思考者，喜欢打破常规',emoji:'🔥',strengths:['创新能力','沟通能力','适应力','洞察力'],summary:'你是一个充满创意的智识冒险家，思维敏捷，善于发现可能性。你享受智识辩论，在交流中激发灵感。',quote:'你看到的不是障碍，而是无限的可能。',growth:'专注是创造力的双胞胎。学会在感兴趣的众多想法中选择一个深耕，你会发现深度比广度更有力量。'},'INFJ':{name:'提倡者',tagline:'安静而神秘，富有原则的理想主义者',emoji:'🌟',strengths:['洞察力','同理心','创造力','原则性'],summary:'你是一个深刻的思考者，追求有意义的人际连接。你富有同理心，善于理解他人，同时保持着对理想的不懈追求。',quote:'你相信改变世界，从改变一个人的想法开始。',growth:'设立健康的边界不是自私。你的时间和精力是有限的，学会说"不"，才能更好地帮助真正需要你的人。'},'INFP':{name:'调停者',tagline:'诗意、善良、无私的理想主义者',emoji:'🦋',strengths:['同理心','创造力','理想主义','适应力'],summary:'你是一个温暖而理想主义的人，内心深处有着坚定的价值观。你善于文字表达，追求自我实现，同时帮助他人找到意义。',quote:'你的内心有一片净土，那里住着最真实的自己。',growth:'行动是梦想的翅膀。有时候"开始做"比"想清楚"更重要，先完成再完美，你会发现自己比想象中更有执行力。'},'ENFJ':{name:'主人公',tagline:'富有魅力和鼓舞人心的领导者',emoji:'✨',strengths:['领导力','沟通力','感染力','洞察力'],summary:'你是一个天生的激励者，拥有非凡的感染力和领袖魅力。你善于理解他人需求，推动团队达成共识和共同目标。',quote:'你天生就知道如何点亮他人的光芒。',growth:'你很容易为他人付出，但别忘了照顾自己。学会在给予之前先确保自己的杯子是满的。'},'ENFP':{name:'竞选者',tagline:'热情洋溢、富有想象力的社交连接者',emoji:'🎨',strengths:['热情','创意','感染力','洞察力'],summary:'你是一个充满热情的创造者，思维自由奔放，善于发现生活的可能性。你是天然的激励者，能激发他人的热情和创造力。',quote:'生命太短暂，不能活在别人的剧本里。',growth:'列清单和设提醒是你的超能力。把一闪而过的想法记录下来，你会惊讶于自己有多少好点子可以成真。'},'ISTJ':{name:'物流师',tagline:'实用且专注事实，值得信赖的专家',emoji:'📋',strengths:['责任感','可靠性','务实','专注'],summary:'你是一个可靠务实的执行者，注重责任和承诺。你善于组织、规划和执行，是团队中不可或缺的中坚力量。',quote:'你相信做好每一件小事，就是最大的不平凡。',growth:'变化不一定是威胁，有时候它是机遇。学会在坚持原则的基础上拥抱适度的灵活性，你会发现新的可能性。'},'ISFJ':{name:'守护者',tagline:'非常专注和温暖的守护者，随时准备保护所爱之人',emoji:'🛡️',strengths:['责任感','温暖','细心','忠诚'],summary:'你是一个温暖的守护者，默默奉献而不求回报。你细心周到，善于照顾他人需要，是朋友和同事最信赖的依靠。',quote:'你不需要舞台，你的伟大在于默默照亮他人。',growth:'你的付出值得被看见和珍惜。学会适时表达自己的需求，你值得拥有同等的关心和回报。'},'ESTJ':{name:'总经理',tagline:'优秀的管理者，善于务实的组织工作',emoji:'🏢',strengths:['执行力','组织力','责任感','务实'],summary:'你是一个天生的管理者，重视效率和执行。你逻辑清晰，决策果断，善于建立和维护制度与秩序。',quote:'你相信秩序是一切成功的基础。',growth:'不是每个人都像你一样重视规则。学会欣赏不同的做事方式，你会从他人身上学到意想不到的东西。'},'ESFJ':{name:'执政官',tagline:'热情有爱心的社交者，关心他人感受',emoji:'🤝',strengths:['社交力','关怀心','责任感','组织力'],summary:'你是一个热情而善于社交的人，重视和谐的人际关系。你善于照顾他人感受，是朋友圈中的情感支柱。',quote:'你最大的力量，是让别人感受到被需要。',growth:'你的价值不是由他人的认可决定的。学会在取悦他人和忠于自己之间找到平衡，真正的魅力来自于真实。'},'ISTP':{name:'鉴赏家',tagline:'大胆而务实的实验者，掌握工具原理',emoji:'🔧',strengths:['动手能力','分析力','冷静','实用'],summary:'你是一个冷静的观察者，擅长分析问题的本质。你动手能力强，善于在实践中学习，追求技术的精通。',quote:'你不需要解释，你知道答案在哪里。',growth:'独来独往是风格，但团队合作能放大你的能力。学会展示你的技能和成果，让更多人看到你的价值。'},'ISFP':{name:'探险家',tagline:'灵活有魅力的艺术家，随时探索新体验',emoji:'🎭',strengths:['审美力','灵活性','观察力','适应力'],summary:'你是一个自由的灵魂，追求美与和谐。你细腻敏感，善于发现生活中的美好，是天生的艺术家和创造者。',quote:'你相信人生是一场美丽的冒险。',growth:'坚持是完成作品的关键。学会给长期项目设立中间目标，你会发现自己有能力完成比想象中更宏大的创作。'},'ESTP':{name:'企业家',tagline:'精力充沛且敏锐的观察者，擅长解决即时问题',emoji:'🚀',strengths:['行动力','适应力','务实','社交力'],summary:'你是一个充满活力的行动派，善于在现实中找到最佳解决方案。你思维敏捷，适应力强，是天生的创业者。',quote:'你不是在解决问题，就是在去解决问题的路上。',growth:'停下来思考不是浪费时间，而是让你跑得更快。学会在行动前花几分钟思考，你会发现效率反而更高。'},'ESFP':{name:'表演者',tagline:'自发的热情专家，喜欢成为众人瞩目的焦点',emoji:'🎉',strengths:['表现力','热情','适应力','感染力'],summary:'你是一个天生的表演者，拥有极强的感染力和魅力。你热爱生活，善于活跃气氛，是朋友圈中的开心果。',quote:'你相信快乐是会传染的。',growth:'专注力是创造深度作品的前提。学会在热闹和安静之间找到平衡，你的才华值得被更认真地对待。'}};
